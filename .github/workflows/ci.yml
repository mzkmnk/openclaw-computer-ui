name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 'API: build'
        run: pnpm api:build

      - name: 'Quality: lint'
        run: pnpm -r lint

      - name: 'Quality: test'
        run: pnpm -r test

      - name: 'Quality: format'
        run: pnpm format:check
